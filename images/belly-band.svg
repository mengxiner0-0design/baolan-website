          <rect x="154" y="232" width="420" height="68" rx="20" fill="#0a6fdc" opacity=".88"/>
          <path d="M246 265h238" stroke="#fff" stroke-width="18" stroke-linecap="round" opacity=".88"/>
          <circle cx="222" cy="265" r="18" fill="#fff" opacity=".9"/>
        </g>
        
  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
